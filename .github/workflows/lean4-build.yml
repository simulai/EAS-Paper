name: Lean4 Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install elan (Lean version manager)
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.7.0
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Verify Lean 4 installation
      run: |
        lean --version
        lake --version

    - name: Build complete EAS Lean4 project
      run: |
        lake build

    - name: Verify no sorry
      run: grep -r "sorry" --include="*.lean" EasLean4/ || echo "No sorry found - OK"

    - name: Verify single axiom
      run: |
        count=$(grep -c "axiom " EasLean4/*.lean || true)
        echo "Found $count axiom(s)"
        if [ "$count" -eq 1 ]; then
          echo "Single axiom verified - OK"
        else
          echo "WARNING: Expected 1 axiom, found $count"
        fi
