name: Lean4 Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install elan (Lean version manager)
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.7.0
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Verify Lean 4 installation
      run: |
        lean --version
        lake --version

    - name: Compile Lean 4 formalization
      run: |
        lean T5_TwoStream_Impossibility.lean
